<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 목록</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <h1 class="logo">Board Study</h1>
      </div>
    </header>

    <main class="container">
      <section class="board-header">
        <h2 class="board-title">게시판</h2>
        <p class="board-description">
          스터디 공지사항과 게시글을 확인해보세요.
        </p>
      </section>

      <!-- 라이브 코딩: 여기는 비어 있음 → id로 JS가 채움. 스크립트는 멘토링 때 </body> 직전에 추가 -->
      <section class="post-list" id="post-list"></section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>© 2026 Board Study</p>
      </div>
    </footer>

    <script src="./posts-data.js"></script>
    <script src="./posts.js"></script>
    <!-- script를 body 끝에 두는 이유: body 앞에 둬도 되지만 실행속도 차이로 뒤에 두는게 속도가 상대적으로 빠름-->>
  </body>
</html>
